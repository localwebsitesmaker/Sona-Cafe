<!DOCTYPE html>
<html>
<head>
<title>Business Listing</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
}

.business{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<h2>Add Business</h2>

<input id="name" placeholder="Business Name">
<input id="category" placeholder="Category">
<input id="phone" placeholder="Phone Number">

<button onclick="addBusiness()">Add Business</button>

<h2>Business List</h2>

<div id="list"></div>

</div>

<script>

function addBusiness(){

let name=document.getElementById("name").value;
let category=document.getElementById("category").value;
let phone=document.getElementById("phone").value;

let businesses=JSON.parse(localStorage.getItem("businesses")) || [];

businesses.push({name,category,phone});

localStorage.setItem("businesses",JSON.stringify(businesses));

showBusinesses();

}

function showBusinesses(){

let businesses=JSON.parse(localStorage.getItem("businesses")) || [];

let html="";

businesses.forEach(b=>{
html+=`
<div class="business">
<b>${b.name}</b><br>
Category: ${b.category}<br>
Phone: ${b.phone}
</div>
`;
});

document.getElementById("list").innerHTML=html;

}

showBusinesses();

</script>

</body>
</html>
